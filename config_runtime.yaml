# API Keys - Runtime configuration
x_api:
  api_key: "your_x_api_key_here"
  api_secret: "your_x_api_secret_here"
  access_token: "your_x_access_token_here"
  access_token_secret: "your_x_access_token_secret_here"
  bearer_token: "your_x_bearer_token_here"

groq_api:
  api_key: "your_groq_api_key_here"

# RSS Feed Configuration
rss:
